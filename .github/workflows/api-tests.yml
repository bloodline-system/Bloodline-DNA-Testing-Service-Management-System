name: API Tests – Staging

on:
  push:
    branches: [main, develop, api-tien]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  newman-tests:
    name: Run Postman Collection (Newman)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Install Newman + HTML reporter ─────────────────────────────────
      - name: Install Newman
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      # ── 4. Inject credentials vào environment file ──────────────────────
      #    Đọc file staging-environment.json (commit sẵn trong repo, không có credentials)
      #    rồi điền username/password từ GitHub Secrets vào.
      - name: Inject credentials into environment
        run: |
          jq --arg user "${{ secrets.STAGING_USERNAME }}" \
             --arg pass "${{ secrets.STAGING_PASSWORD }}" \
             '.values |= map(
               if .key == "username" then .value = $user
               elif .key == "password" then .value = $pass
               else . end
             )' postman/staging-environment.json > /tmp/staging-env-filled.json

      # ── 5. Tạo thư mục reports ───────────────────────────────────────────
      - name: Create reports directory
        run: mkdir -p reports

      # ── 6. Health check staging API URL ─────────────────────────────────
      - name: Health-check staging API
        run: |
          API_URL=${{ secrets.STAGING_URL }}
          echo "Checking staging API health at $API_URL/actuator/health"
          for i in {1..20}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$API_URL/actuator/health" || true)
            echo "Attempt $i -> $HTTP_STATUS"
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "API is healthy"; break
            fi
            sleep 5
          done
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: API health check failed at $API_URL/actuator/health" >&2
            exit 1
          fi

      # ── 7. Chạy Newman ───────────────────────────────────────────────────
      - name: Run Newman tests
        run: |
          COLLECTION=postman/DNA_Testing_System_v3_postman_collection.json
          ENV_FILE=/tmp/staging-env-filled.json

          echo "collection=$COLLECTION"
          echo "environment=$ENV_FILE"

          if [ ! -f "$COLLECTION" ]; then
            echo "ERROR: collection file not found: $COLLECTION" >&2
            exit 1
          fi
          if [ ! -f "$ENV_FILE" ]; then
            echo "ERROR: environment file not found: $ENV_FILE" >&2
            exit 1
          fi

          set -x
          newman run "$COLLECTION" \
            --environment "$ENV_FILE" \
            --reporters cli,htmlextra,json \
            --reporter-htmlextra-export reports/result.html \
            --reporter-json-export reports/result.json \
            --reporter-htmlextra-title "DNA Testing System – Staging" \
            --reporter-htmlextra-showOnlyFails \
            --delay-request 300 \
            --timeout-request 10000 \
            --color on
          NEWMAN_EXIT=$?
          set +x
          echo "Newman exit code: $NEWMAN_EXIT"
          exit $NEWMAN_EXIT

      # ── 8. Upload report ─────────────────────────────────────────────────
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report-${{ github.run_number }}
          path: reports/
          retention-days: 14

      # ── 8. Fail job nếu có test thất bại (optional) ──────────────────────
      - name: Check test results
        run: |
          if [ ! -f reports/result.json ]; then
            echo "⚠️ reports/result.json not found; the Newman run may have failed before outputs were generated."
            exit 1
          fi

          FAILURES=$(jq '.run.stats.assertions.failed // 0' reports/result.json)
          echo "Failed assertions: $FAILURES"
          if [ "$FAILURES" -gt "0" ]; then
            echo "❌ $FAILURES assertion(s) failed!"
            exit 1
          fi
          echo "✅ All tests passed!"
