name: API Tests – Staging

on:
  workflow_call:
    inputs:
      environment:
        required: false
        type: string
        default: staging
    secrets:
      STAGING_USERNAME:
        required: true
      STAGING_PASSWORD:
        required: true
      STAGING_URL:
        required: false   # 👈 QUAN TRỌNG: bỏ required

jobs:
  login:
    runs-on: ubuntu-latest
    outputs:
      access_token: ${{ steps.login.outputs.token }}

    steps:
      - name: Resolve BASE_URL
        id: base
        run: |
          BASE_URL="${{ secrets.STAGING_URL }}"

          # fallback nếu không có secret
          if [ -z "$BASE_URL" ]; then
            BASE_URL="http://44.205.114.232"
          fi

          echo "BASE_URL=$BASE_URL"
          echo "base_url=$BASE_URL" >> $GITHUB_OUTPUT

      - name: Login
        id: login
        run: |
          BASE_URL="${{ steps.base.outputs.base_url }}"

          RESPONSE=$(curl -s -X POST \
            "$BASE_URL/api/v1/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${{ secrets.STAGING_USERNAME }}\",\"password\":\"${{ secrets.STAGING_PASSWORD }}\",\"rememberMe\":true}")

          TOKEN=$(echo "$RESPONSE" | jq -r '.data.access_token // .data.accessToken // empty')

          if [ -z "$TOKEN" ]; then
            echo "❌ Login failed"
            echo "$RESPONSE"
            exit 1
          fi

          echo "token=$TOKEN" >> $GITHUB_OUTPUT

  api-tests:
    needs: login
    runs-on: ubuntu-latest

    strategy:
      matrix:
        collection:
          - auth.json
          - service.json

    steps:
      - uses: actions/checkout@v4

      - name: Install newman
        run: npm install -g newman

      - name: Prepare env
        run: |
          BASE_URL="${{ secrets.STAGING_URL }}"
          if [ -z "$BASE_URL" ]; then
            BASE_URL="http://44.205.114.232"
          fi

          jq \
            --arg token "${{ needs.login.outputs.access_token }}" \
            --arg base "$BASE_URL" \
            --arg user "${{ secrets.STAGING_USERNAME }}" \
            --arg pass "${{ secrets.STAGING_PASSWORD }}" \
            '.values |= map(
              if .key=="access_token" then .value=$token
              elif .key=="baseUrl" then .value=$base
              elif .key=="username" then .value=$user
              elif .key=="password" then .value=$pass
              else . end
            )' postman/staging-environment.json > env.json

      - name: Run test
        run: |
          newman run postman/${{ matrix.collection }} -e env.json || true