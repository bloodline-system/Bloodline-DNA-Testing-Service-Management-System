name: API Tests – Staging

on:
  workflow_call:
    inputs:
      environment:
        required: false
        type: string
        default: staging
    secrets:
      STAGING_USERNAME:
        required: true
      STAGING_PASSWORD:
        required: true
      STAGING_URL:
        required: false

jobs:
  newman-tests:
    name: Run Postman Collection (Newman)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Inject credentials into environment
        run: |
          jq --arg user "${{ secrets.STAGING_USERNAME }}" \
             --arg pass "${{ secrets.STAGING_PASSWORD }}" \
             '.values |= map(
               if .key == "username" then .value = $user
               elif .key == "password" then .value = $pass
               else . end
             )' postman/staging-environment.json > /tmp/staging-env-filled.json

      - name: Create reports directory
        run: mkdir -p reports

      - name: Health-check staging API
        run: |
          API_URL="${{ secrets.STAGING_URL }}"
          if [ -z "$API_URL" ]; then
            echo "⚠️ STAGING_URL not set, skipping health check"
            exit 0
          fi
          for i in {1..20}; do
            HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$API_URL/actuator/health" || true)
            echo "Attempt $i -> $HTTP_STATUS"
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "API is healthy"; break
            fi
            sleep 5
          done
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: API health check failed" >&2
            exit 1
          fi

      - name: Run Newman tests
        run: |
          newman run postman/DNA_Testing_System_v3.postman_collection.json \
            --environment /tmp/staging-env-filled.json \
            --reporters cli,htmlextra,json \
            --reporter-htmlextra-export reports/result.html \
            --reporter-json-export reports/result.json \
            --reporter-htmlextra-title "DNA Testing System – Staging" \
            --reporter-htmlextra-showOnlyFails \
            --delay-request 300 \
            --timeout-request 10000 \
            --color on || true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report-${{ github.run_number }}
          path: reports/
          retention-days: 14

      - name: Check test results
        run: |
          if [ ! -f reports/result.json ]; then
            echo "⚠️ reports/result.json not found"
            exit 1
          fi
          FAILURES=$(jq '.run.stats.assertions.failed // 0' reports/result.json)
          echo "Failed assertions: $FAILURES"
          if [ "$FAILURES" -gt "0" ]; then
            echo "❌ $FAILURES assertion(s) failed!"
            exit 1
          fi
          echo "✅ All tests passed!"