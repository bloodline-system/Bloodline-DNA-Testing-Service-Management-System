              --arg date     "$DATE"     --arg failed   "$FAILED"     \
              --arg total    "$TOTAL"    --arg branch   "$BRANCH"     \
              --arg commit   "$COMMIT"   --arg actor    "$ACTOR"      \
              --arg failures "$FAILURES" --arg run_url  "$RUN_URL"    \
              '{
                fields: {
                  project:   {key:$proj},
                  issuetype: {name:"Bug"},
                  priority:  {name:"High"},
                  summary:   ("[AUTO-BUG][" + $env + "][" + $col + "] API Tests Failed – " + $date + " (" + $failed + "/" + $total + " failed)"),
                  labels:    ["automated-test","ci-cd",$env,$col],
                  description: {
                    type:"doc", version:1,
                    content:[
                      {type:"panel",attrs:{panelType:"error"},content:[
                        {type:"paragraph",content:[{type:"text",text:("❌ " + $col + " tests failed on " + $env)}]}
                      ]},
                      {type:"heading",attrs:{level:2},content:[{type:"text",text:"📋 Details"}]},
                      {type:"bulletList",content:[
                        {type:"listItem",content:[{type:"paragraph",content:[{type:"text",text:"Collection: ",marks:[{type:"strong"}]},{type:"text",text:$col}]}]},
                        {type:"listItem",content:[{type:"paragraph",content:[{type:"text",text:"Environment: ",marks:[{type:"strong"}]},{type:"text",text:$env}]}]},
                        {type:"listItem",content:[{type:"paragraph",content:[{type:"text",text:"Branch: ",marks:[{type:"strong"}]},{type:"text",text:$branch}]}]},
